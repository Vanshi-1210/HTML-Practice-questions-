<!-- Created an HTML form matching the given design with:
- Name text field
- Gender radio buttons (Male/Female)
- Country dropdown menu
- Message textarea
- Subscribe checkbox
- Submit button
Used proper form elements and labels for a clean, user-friendly layout. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form</title>
</head>
<body>
    <form action="action.php">
        <div>
        <label for="name">Name:</label>
        <input type="text" name="name" id="name">
        </div>
        <br>
        <div>
        <label for="sex">Sex:</label>
        <input type="radio" id="male" name="sex"> 
        <label for="male">Male</label>
        <input type="radio" id="female" name="sex"> 
        <label for="female">Female</label>
        </div>
        <br>
        <div>
            <label for="Country">Country:</label>
            <select name="Country" id="Country">
            <option value="select">Select an option</option>
            <option value="India">India</option>
            <option value="Nepal">Nepal</option>
            <option value="USA">USA</option>
            <option value="Canada">Canada</option>
            </select>
        </div>
        <br>
        <div>
            <label for="msg">Message:</label>
            <br>
            <textarea name="msg" id="msg" rows="5" cols="40"></textarea>
        </div>
        <br>
        <div>
        <input type="checkbox" name="Subscribe" id="sub_check">
        <label for="sub_check">Subscribe?</label>
        <br>
        </div>
        <br>
        <button>Submit</button>
    </form>

</body>
</html>
