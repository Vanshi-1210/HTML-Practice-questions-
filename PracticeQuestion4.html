<!-- 
  Practice Question 5: HTML Entities and Symbols
  Task: Print a sentence inside an <h1> element using HTML character entities 
        for the ampersand (&), cloud, and rain/umbrella symbols.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity</title>
</head>
<body>
    <h1>The sky is cloudy &#9729; &#38; it will rain &#9748; today</h1>
</body>
</html>
